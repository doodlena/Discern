<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DISCERN</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
    }

    .header {
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .container {
      padding: 20px;
    }

    .analyze-button {
      width: 100%;
      padding: 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .analyze-button:hover {
      background: #1d4ed8;
    }

    .analyze-button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .loading {
      text-align: center;
      padding: 30px;
      color: #6b7280;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result {
      padding: 20px;
    }

    .score-display {
      text-align: center;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .score-value {
      font-size: 64px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 10px;
    }

    .score-high { color: #10b981; }
    .score-medium { color: #f59e0b; }
    .score-low { color: #ef4444; }

    .score-label {
      font-size: 14px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .summary {
      background: white;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #2563eb;
      margin-bottom: 15px;
    }

    .summary h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #111827;
    }

    .summary p {
      font-size: 13px;
      line-height: 1.6;
      color: #4b5563;
    }

    .factors {
      background: white;
      padding: 15px;
      border-radius: 8px;
    }

    .factor {
      margin-bottom: 12px;
    }

    .factor:last-child {
      margin-bottom: 0;
    }

    .factor-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .factor-name {
      font-weight: 600;
      color: #374151;
    }

    .factor-value {
      color: #6b7280;
    }

    .factor-bar {
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }

    .factor-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .factor-high { background: #10b981; }
    .factor-medium { background: #f59e0b; }
    .factor-low { background: #ef4444; }

    .actions {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .error {
      padding: 20px;
      text-align: center;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .error-message {
      color: #ef4444;
      font-size: 14px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>DISCERN</h1>
    <p>AI Credibility Checker</p>
  </div>

  <div id="app">
    <div class="container">
      <button id="analyzeBtn" class="analyze-button">
        Analyze This Page
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
